      max-width: 900px;

      font-size: 20px;
      letter-spacing: 0;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 9px 14px;
      border-radius: 8px;
      background: #276b63;
      color: #fff;
      font-weight: 700;
      text-decoration: none;
    }

    @media (max-width: 640px) {
      .item { grid-template-columns: 1fr; }
      .button { width: 100%; }
    }

</head>
